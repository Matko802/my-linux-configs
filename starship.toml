"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](red)\
$os\
$username\
[](bg:red fg:red)\
$directory\
[](fg:red bg:red)\
$git_branch\
$git_status\
[](fg:red bg:green)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[](fg:green bg:green)\
$docker_context\
[](fg:green bg:black)\
$time\
[ ](fg:black)\
"""

# Disable the blank line at the start of the prompt
add_newline = false

[username]
show_always = true
style_user = "bg:red"
style_root = "bg:red"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:red"
disabled = true

[directory]
style = "bg:red"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[c]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:cyan"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "bg:yellow"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:yellow"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:green"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:black"
format = '[ $time ]($style)'
